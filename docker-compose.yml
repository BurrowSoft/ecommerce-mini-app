services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      # Fallback defaults to "development", not "production": the session
      # cookie's `secure` flag is tied to this (see backend/src/setup-app.ts),
      # and this stack runs over plain http://localhost. If someone forgets
      # to copy .env.example to .env, "production" here would silently break
      # login (browser won't send a secure cookie over http) instead of
      # failing safe. Set it explicitly to "production" only once real HTTPS
      # is in front of this stack.
      NODE_ENV: ${NODE_ENV:-development}
      BACKEND_PORT: 4000
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_INACTIVITY_TIMEOUT_SECONDS: ${SESSION_INACTIVITY_TIMEOUT_SECONDS:-3600}
      LOGIN_RATE_LIMIT_PER_IP_MAX: ${LOGIN_RATE_LIMIT_PER_IP_MAX:-10}
      LOGIN_RATE_LIMIT_PER_IP_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_PER_IP_WINDOW_SECONDS:-60}
      LOGIN_RATE_LIMIT_PER_ACCOUNT_MAX: ${LOGIN_RATE_LIMIT_PER_ACCOUNT_MAX:-5}
      LOGIN_RATE_LIMIT_PER_ACCOUNT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_PER_ACCOUNT_WINDOW_SECONDS:-60}
      FRONTEND_ORIGIN: http://localhost:${FRONTEND_PORT:-3000}
      SEED_PRODUCT_COUNT: ${SEED_PRODUCT_COUNT:-3000}
      SEED_DEMO_USER_EMAIL: ${SEED_DEMO_USER_EMAIL}
      SEED_DEMO_USER_PASSWORD: ${SEED_DEMO_USER_PASSWORD}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        # Must be the browser-reachable URL (published host port), never the
        # internal Docker service name — see frontend/Dockerfile for why.
        NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-4000}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
